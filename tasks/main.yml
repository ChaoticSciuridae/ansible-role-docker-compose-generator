---
- name: ensure destination for compose file exists
  file:
    path: "{{ docker_compose_generator_output_path }}"
    state: directory

- name: Find all compose files
  set_fact:
    compose_files: >-
      {{
        query(
          'filetree',
          services_directory + (docker_compose_hostname | default(inventory_hostname))
        )
        | selectattr('state', 'eq', 'file')
        | selectattr('path', 'regex', '.ya?ml$')
        | rejectattr('path', 'regex', 'config-[^/]+/')
        | list
      }}

- name: Parse all compose files
  set_fact:
    parsed_compose_files: >-
      {{
        parsed_compose_files | default([]) + [
          (
            lookup('template', item.src) | from_yaml
          ) | combine({
            '__source_file': (item.src | basename)
          })
        ]
      }}
  loop: "{{ compose_files | sort(attribute='src') }}"
  loop_control:
    label: "{{ item.src | basename }}"
  when: (item.src | basename) not in (disabled_compose_files | default([]))
  no_log: false

- name: Merge all compose sections except services
  set_fact:
    all_configs: "{{ all_configs | default({}) | combine(item.configs | default({})) }}"
    all_networks: "{{ all_networks | default({}) | combine(item.networks | default({})) }}"
    all_volumes: "{{ all_volumes | default({}) | combine(item.volumes | default({})) }}"
    all_secrets: "{{ all_secrets | default({}) | combine(item.secrets | default({})) }}"
  loop: "{{ parsed_compose_files }}"
  loop_control:
    label: "{{ item.__source_file | default('unknown') }}"
  no_log: false

- name: Build combined compose content
  set_fact:
    combined_compose_raw: |
      # Generated by ironicbadger.docker-compose-generator
      # badger badger badger mushroom mushrooooom...
      {% if all_configs %}
      configs:
        {{ all_configs | to_nice_yaml(indent=2, sort_keys=False) | indent(2) | trim }}
      {% endif %}
      {% if all_networks %}
      networks:
        {{ all_networks | to_nice_yaml(indent=2, sort_keys=False) | indent(2) | trim }}
      {% endif %}
      {% if all_volumes %}
      volumes:
        {{ all_volumes | to_nice_yaml(indent=2, sort_keys=False) | indent(2) | trim }}
      {% endif %}
      {% if all_secrets %}
      secrets:
        {{ all_secrets | to_nice_yaml(indent=2, sort_keys=False) | indent(2) | trim }}
      {% endif %}
      services:
      {% for compose in parsed_compose_files %}
      {% if compose.services is defined and compose.services %}
        # ----------------------------------------------------------------------------------------------------
        #  {{ (" " ~ compose.__source_file ~ " ") | center(100) | replace(" ", "-") }}
        # ----------------------------------------------------------------------------------------------------
        {{ compose.services | to_nice_yaml(indent=2, sort_keys=False) | indent(2) | trim }}
      {% endif %}
      {% endfor %}
  no_log: false

- name: Fix list indentation for better readability
  set_fact:
    combined_compose: "{{ combined_compose_raw | indent_yaml_lists }}"
  no_log: false

- name: Write combined compose file
  copy:
    content: "{{ combined_compose }}"
    dest: "{{ docker_compose_generator_output_path }}/compose.yaml"
    owner: "{{ docker_compose_generator_uid }}"
    group: "{{ docker_compose_generator_gid }}"
  no_log: false

- name: Find all config directories
  find:
    paths: "{{ services_directory }}{{ docker_compose_hostname | default(inventory_hostname) }}"
    patterns: "config-*"
    file_type: directory
    recurse: true
  delegate_to: localhost
  become: false
  register: config_dirs

- name: Deploy config files from config-* directories
  include_tasks: deploy-config.yml
  loop: "{{ config_dirs.files }}"
  loop_control:
    loop_var: config_dir
    label: "{{ config_dir.path | basename }}"
  when: config_dirs.files | length > 0

- name: Run docker compose config check
  command: docker compose -f {{ docker_compose_generator_output_path }}/compose.yaml config
  register: compose_check
  changed_when: false
  when: docker_compose_generator_validate | bool

- name: Deploy stack with docker compose
  command: docker compose -f {{ docker_compose_generator_output_path }}/compose.yaml up -d
  register: compose_deploy
  when: docker_compose_generator_auto_deploy | bool